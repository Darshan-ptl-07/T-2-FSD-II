<form action="/submit" method="post">
    Name:<input name="uname" /><br>
    E-Mail:<input type="email" name="eid"><br>
    Message:<textarea name="msg" rows="20" cols="30"></textarea><br>
    Ratting:<input type="radio" name="rating" value="Excellent" />Excellent

    submit:<input type="submit">
</form>
